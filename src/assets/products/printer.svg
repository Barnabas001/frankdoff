<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="pBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8ebf0"/>
      <stop offset="100%" stop-color="#c8cdd8"/>
    </linearGradient>
    <linearGradient id="pTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f2f6"/>
      <stop offset="100%" stop-color="#d8dce6"/>
    </linearGradient>
    <filter id="ps"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/></filter>
  </defs>

  <ellipse cx="200" cy="282" rx="120" ry="8" fill="#000" opacity="0.1"/>

  <!-- Paper output tray -->
  <rect x="90" y="55" width="220" height="8" rx="3" fill="#f5f7fa"/>
  <!-- Papers stacked -->
  <rect x="110" y="45" width="180" height="3" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="113" y="41" width="174" height="3" rx="1" fill="#f8f8f8" opacity="0.85"/>
  <rect x="116" y="37" width="168" height="3" rx="1" fill="#f5f5f5" opacity="0.8"/>
  <rect x="119" y="33" width="162" height="3" rx="1" fill="#f2f2f2" opacity="0.75"/>
  <!-- Paper text lines -->
  <rect x="130" y="36" width="70" height="1.5" rx="1" fill="#1d7ef5" opacity="0.5"/>
  <rect x="130" y="40" width="55" height="1.5" rx="1" fill="#333" opacity="0.25"/>
  <rect x="130" y="44" width="65" height="1.5" rx="1" fill="#333" opacity="0.2"/>

  <!-- Main body -->
  <rect x="80" y="62" width="240" height="130" rx="10" fill="url(#pBodyGrad)" filter="url(#ps)"/>

  <!-- Top lid section -->
  <rect x="80" y="62" width="240" height="45" rx="10 10 0 0" fill="url(#pTopGrad)"/>

  <!-- Control panel -->
  <rect x="240" y="72" width="68" height="28" rx="5" fill="#dde2ec"/>
  <!-- LCD screen -->
  <rect x="244" y="75" width="40" height="18" rx="3" fill="#1a2a1a"/>
  <rect x="247" y="78" width="34" height="12" rx="2" fill="#1e3a1e"/>
  <rect x="249" y="80" width="20" height="3" rx="1" fill="#22c55e" opacity="0.9"/>
  <rect x="249" y="85" width="14" height="2" rx="1" fill="#22c55e" opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="290" cy="80" r="4" fill="#1d7ef5" opacity="0.9"/>
  <circle cx="290" cy="91" r="4" fill="#aab0be"/>
  <rect x="300" y="77" width="5" height="3" rx="1" fill="#888"/>
  <rect x="300" y="82" width="5" height="3" rx="1" fill="#888"/>
  <rect x="300" y="87" width="5" height="3" rx="1" fill="#888"/>

  <!-- Paper feed slot -->
  <rect x="95" y="78" width="130" height="22" rx="4" fill="#bcc2d0"/>
  <rect x="98" y="81" width="124" height="16" rx="3" fill="#aab2c0"/>
  <!-- Feed lines -->
  <rect x="103" y="84" width="114" height="1.5" rx="1" fill="#9aa0b0" opacity="0.6"/>
  <rect x="103" y="88" width="114" height="1.5" rx="1" fill="#9aa0b0" opacity="0.5"/>
  <rect x="103" y="92" width="114" height="1.5" rx="1" fill="#9aa0b0" opacity="0.4"/>

  <!-- Middle section - cartridge/mechanism area -->
  <rect x="80" y="107" width="240" height="50" rx="0" fill="#c8cdd6"/>
  <!-- Cartridge visible strip -->
  <rect x="90" y="115" width="220" height="15" rx="3" fill="#b0b8c8"/>
  <rect x="98" y="118" width="45" height="9" rx="2" fill="#1d7ef5" opacity="0.8"/>
  <rect x="148" y="118" width="45" height="9" rx="2" fill="#ef4444" opacity="0.8"/>
  <rect x="198" y="118" width="45" height="9" rx="2" fill="#F5C518" opacity="0.9"/>
  <rect x="248" y="118" width="45" height="9" rx="2" fill="#111" opacity="0.7"/>
  <!-- Rail -->
  <rect x="90" y="133" width="220" height="3" rx="1" fill="#a0a8b8" opacity="0.7"/>

  <!-- Bottom / paper output -->
  <rect x="80" y="157" width="240" height="35" rx="0 0 10 10" fill="#d0d5e0"/>
  <!-- Output slot -->
  <rect x="95" y="162" width="150" height="20" rx="3" fill="#bcc2d0"/>
  <rect x="98" y="165" width="144" height="14" rx="2" fill="#aab2c0"/>
  <!-- LED indicator -->
  <circle cx="260" cy="170" r="5" fill="#22c55e" opacity="0.9"/>
  <circle cx="260" cy="170" r="3" fill="#86efac"/>
  <!-- USB ports -->
  <rect x="270" y="165" width="12" height="8" rx="1" fill="#8090a0"/>
  <rect x="285" y="165" width="12" height="8" rx="1" fill="#8090a0"/>

  <!-- WiFi signal -->
  <path d="M155 248 Q175 228 195 248" fill="none" stroke="#1d7ef5" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M162 254 Q175 242 188 254" fill="none" stroke="#1d7ef5" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="175" cy="258" r="3" fill="#1d7ef5" opacity="0.9"/>
  <!-- WiFi label -->
  <rect x="150" y="268" width="50" height="8" rx="4" fill="#1d7ef5" opacity="0.15"/>
  <rect x="158" y="270" width="34" height="4" rx="2" fill="#1d7ef5" opacity="0.6"/>
</svg>
