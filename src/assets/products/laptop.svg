<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2840"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d5e0"/>
      <stop offset="100%" stop-color="#a8afc0"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0c6d4"/>
      <stop offset="100%" stop-color="#9aa0b0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d7ef5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="200" cy="262" rx="130" ry="10" fill="#000" opacity="0.15"/>

  <!-- Laptop body (lid) -->
  <rect x="60" y="30" width="280" height="180" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Screen bezel -->
  <rect x="68" y="38" width="264" height="164" rx="7" fill="#1a1a2e"/>
  <!-- Screen -->
  <rect x="74" y="44" width="252" height="152" rx="5" fill="url(#screenGrad)"/>

  <!-- Screen content - OS-like UI -->
  <!-- Taskbar -->
  <rect x="74" y="44" width="252" height="18" rx="5 5 0 0" fill="#0a0f1f"/>
  <circle cx="87" cy="53" r="4" fill="#ff5f57"/>
  <circle cx="100" cy="53" r="4" fill="#ffbd2e"/>
  <circle cx="113" cy="53" r="4" fill="#28c840"/>
  <rect x="155" y="49" width="90" height="8" rx="4" fill="#1d7ef5" opacity="0.7"/>

  <!-- Window -->
  <rect x="82" y="68" width="150" height="110" rx="4" fill="#0d1e35"/>
  <rect x="82" y="68" width="150" height="14" rx="4 4 0 0" fill="#162840"/>
  <rect x="87" y="72" width="60" height="6" rx="3" fill="#1d7ef5" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="87" y="88" width="120" height="4" rx="2" fill="#1d7ef5" opacity="0.5"/>
  <rect x="87" y="96" width="90" height="4" rx="2" fill="#7c3aed" opacity="0.6"/>
  <rect x="87" y="104" width="110" height="4" rx="2" fill="#F5C518" opacity="0.5"/>
  <rect x="87" y="112" width="70" height="4" rx="2" fill="#1d7ef5" opacity="0.4"/>
  <rect x="87" y="120" width="100" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="87" y="128" width="80" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <rect x="87" y="136" width="115" height="4" rx="2" fill="#1d7ef5" opacity="0.4"/>
  <rect x="87" y="144" width="65" height="4" rx="2" fill="#F5C518" opacity="0.4"/>
  <rect x="87" y="152" width="95" height="4" rx="2" fill="#22c55e" opacity="0.4"/>

  <!-- Sidebar widget -->
  <rect x="240" y="68" width="78" height="55" rx="4" fill="#111d30"/>
  <rect x="245" y="73" width="40" height="5" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="245" y="82" width="68" height="3" rx="1.5" fill="#1d7ef5" opacity="0.7"/>
  <rect x="245" y="88" width="50" height="3" rx="1.5" fill="#1d7ef5" opacity="0.4"/>
  <rect x="245" y="94" width="60" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
  <rect x="245" y="100" width="45" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <rect x="245" y="106" width="55" height="3" rx="1.5" fill="#F5C518" opacity="0.4"/>
  <rect x="245" y="112" width="40" height="3" rx="1.5" fill="#1d7ef5" opacity="0.3"/>

  <!-- Another widget -->
  <rect x="240" y="128" width="78" height="50" rx="4" fill="#111d30"/>
  <rect x="245" y="133" width="35" height="5" rx="2" fill="#fff" opacity="0.3"/>
  <circle cx="262" cy="154" r="14" fill="none" stroke="#1d7ef5" stroke-width="3" opacity="0.6"/>
  <path d="M262 140 A14 14 0 0 1 276 154" fill="none" stroke="#F5C518" stroke-width="3" stroke-linecap="round"/>

  <!-- Glow overlay on screen -->
  <rect x="74" y="44" width="252" height="152" rx="5" fill="url(#glowGrad)" opacity="0.05"/>

  <!-- Hinge line -->
  <rect x="60" y="206" width="280" height="4" rx="2" fill="#8a9ab0"/>

  <!-- Base / keyboard -->
  <path d="M45 210 Q50 255 60 258 L340 258 Q350 255 355 210 Z" fill="url(#baseGrad)" filter="url(#shadow)"/>
  <!-- Keyboard rows -->
  <rect x="90" y="220" width="220" height="5" rx="2" fill="#888fa0" opacity="0.5"/>
  <rect x="90" y="229" width="220" height="5" rx="2" fill="#888fa0" opacity="0.45"/>
  <rect x="95" y="238" width="210" height="5" rx="2" fill="#888fa0" opacity="0.4"/>
  <!-- Keys detail -->
  <rect x="100" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="118" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="136" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="154" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="172" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="190" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="208" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="226" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="244" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="262" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <rect x="280" y="220" width="14" height="5" rx="1" fill="#9aa0b2" opacity="0.7"/>
  <!-- Trackpad -->
  <rect x="165" y="244" width="70" height="10" rx="5" fill="#a0a8ba" opacity="0.6"/>
  <!-- Logo -->
  <circle cx="200" cy="125" r="10" fill="none" stroke="#c8cfd8" stroke-width="1.5" opacity="0.3"/>
</svg>
