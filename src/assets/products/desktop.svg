  <rect x="172" y="180" width="16" height="40" rx="2" fill="#b0b8c8"/>
  <rect x="145" y="218" width="70" height="10" rx="5" fill="#a8b0c0"/>

  <!-- Tower PC -->
  <rect x="310" y="80" width="62" height="140" rx="6" fill="url(#towerGrad)" filter="url(#sh2)"/>
  <rect x="316" y="90" width="50" height="30" rx="3" fill="#0d1525"/>
  <!-- Power button -->
  <circle cx="341" cy="75" r="6" fill="#222" stroke="#888" stroke-width="1"/>
  <circle cx="341" cy="75" r="3" fill="#1d7ef5" opacity="0.9"/>
  <!-- Drive slots -->
  <rect x="319" y="130" width="44" height="7" rx="2" fill="#aab0be"/>
  <rect x="319" y="141" width="44" height="7" rx="2" fill="#aab0be"/>
  <rect x="319" y="152" width="44" height="4" rx="2" fill="#aab0be" opacity="0.6"/>
  <!-- Vents -->
  <rect x="319" y="165" width="44" height="2" rx="1" fill="#9aa0b0" opacity="0.6"/>
  <rect x="319" y="170" width="44" height="2" rx="1" fill="#9aa0b0" opacity="0.5"/>
  <rect x="319" y="175" width="44" height="2" rx="1" fill="#9aa0b0" opacity="0.4"/>
  <rect x="319" y="180" width="44" height="2" rx="1" fill="#9aa0b0" opacity="0.3"/>
  <!-- USB ports -->
  <rect x="325" y="195" width="10" height="6" rx="1" fill="#7a8090"/>
  <rect x="338" y="195" width="10" height="6" rx="1" fill="#7a8090"/>
  <!-- Logo area -->
  <rect x="325" y="207" width="30" height="5" rx="2" fill="#aab0be" opacity="0.5"/>

  <!-- Mouse -->
  <ellipse cx="250" cy="255" rx="20" ry="27" fill="#c8cfd8" filter="url(#sh2)"/>
  <ellipse cx="250" cy="248" rx="14" ry="18" fill="#b8c0d0"/>
  <line x1="250" y1="230" x2="250" y2="256" stroke="#a0a8b8" stroke-width="1.5" stroke-dasharray="0"/>
