  <rect x="80" y="240" width="200" height="48" rx="6" fill="#c8cfd8" filter="url(#sh2)"/>
  <rect x="85" y="246" width="190" height="36" rx="4" fill="#b8c0d0"/>
  <!-- Key rows -->
  <rect x="90" y="250" width="180" height="7" rx="2" fill="#a8b0c0" opacity="0.6"/>
  <rect x="90" y="260" width="180" height="7" rx="2" fill="#a8b0c0" opacity="0.55"/>
  <rect x="95" y="270" width="170" height="7" rx="2" fill="#a8b0c0" opacity="0.5"/>
  <!-- Individual keys -->
  <rect x="92" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="105" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="118" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="131" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="144" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="157" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="170" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="183" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="196" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="209" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="222" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="235" y="250" width="10" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <rect x="248" y="250" width="22" height="7" rx="1.5" fill="#bec6d4" opacity="0.8"/>
  <!-- Spacebar -->
  <rect x="130" y="270" width="90" height="7" rx="2" fill="#bec6d4" opacity="0.8"/>
</svg>
