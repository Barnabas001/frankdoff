<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="monGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8dde8"/>
      <stop offset="100%" stop-color="#b0b8c8"/>
    </linearGradient>
    <linearGradient id="scr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#061020"/>
    </linearGradient>
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8cfd8"/>
      <stop offset="100%" stop-color="#9aa0b0"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <ellipse cx="200" cy="290" rx="160" ry="8" fill="#000" opacity="0.1"/>

  <!-- Monitor -->
  <rect x="70" y="20" width="220" height="160" rx="8" fill="url(#monGrad)" filter="url(#sh2)"/>
  <rect x="78" y="28" width="204" height="144" rx="5" fill="#111"/>
  <rect x="82" y="32" width="196" height="136" rx="4" fill="url(#scr)"/>

  <!-- Screen UI -->
  <rect x="82" y="32" width="196" height="16" rx="4 4 0 0" fill="#0a0e1e"/>
  <circle cx="93" cy="40" r="3.5" fill="#ff5f57"/>
  <circle cx="104" cy="40" r="3.5" fill="#ffbd2e"/>
  <circle cx="115" cy="40" r="3.5" fill="#28c840"/>
  <rect x="135" y="37" width="70" height="7" rx="3.5" fill="#1a2a40"/>
  <rect x="248" y="37" width="22" height="7" rx="3.5" fill="#1d7ef5" opacity="0.7"/>

  <!-- Dashboard widgets -->
  <rect x="88" y="54" width="85" height="55" rx="4" fill="#111d30"/>
  <rect x="93" y="59" width="40" height="5" rx="2" fill="#fff" opacity="0.35"/>
  <rect x="93" y="68" width="75" height="3" rx="1.5" fill="#1d7ef5" opacity="0.7"/>
  <rect x="93" y="74" width="55" height="3" rx="1.5" fill="#1d7ef5" opacity="0.4"/>
  <rect x="93" y="80" width="65" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
  <rect x="93" y="86" width="45" height="3" rx="1.5" fill="#F5C518" opacity="0.5"/>
  <rect x="93" y="92" width="70" height="3" rx="1.5" fill="#22c55e" opacity="0.4"/>
  <rect x="93" y="98" width="50" height="3" rx="1.5" fill="#1d7ef5" opacity="0.35"/>

  <!-- Chart widget -->
  <rect x="180" y="54" width="90" height="55" rx="4" fill="#111d30"/>
  <rect x="185" y="59" width="35" height="5" rx="2" fill="#fff" opacity="0.35"/>
  <!-- Bar chart -->
  <rect x="188" y="96" width="9" height="12" rx="2" fill="#1d7ef5" opacity="0.8"/>
  <rect x="200" y="88" width="9" height="20" rx="2" fill="#7c3aed" opacity="0.8"/>
  <rect x="212" y="92" width="9" height="16" rx="2" fill="#F5C518" opacity="0.8"/>
  <rect x="224" y="80" width="9" height="28" rx="2" fill="#1d7ef5" opacity="0.8"/>
  <rect x="236" y="86" width="9" height="22" rx="2" fill="#22c55e" opacity="0.8"/>
  <rect x="248" y="90" width="9" height="18" rx="2" fill="#7c3aed" opacity="0.6"/>

  <!-- Bottom row widgets -->
  <rect x="88" y="116" width="55" height="40" rx="4" fill="#111d30"/>
  <rect x="150" y="116" width="55" height="40" rx="4" fill="#111d30"/>
  <rect x="212" y="116" width="58" height="40" rx="4" fill="#111d30"/>
  <circle cx="115" cy="133" r="10" fill="none" stroke="#1d7ef5" stroke-width="2.5" opacity="0.7"/>
  <path d="M115 123 A10 10 0 0 1 125 133" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="155" y="122" width="45" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
  <rect x="155" y="128" width="35" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <rect x="155" y="134" width="40" height="3" rx="1.5" fill="#22c55e" opacity="0.4"/>
  <rect x="155" y="140" width="30" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
  <rect x="217" y="122" width="48" height="26" rx="3" fill="#1a2840"/>
  <rect x="220" y="125" width="42" height="3" rx="1.5" fill="#1d7ef5" opacity="0.6"/>
  <rect x="220" y="131" width="32" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
  <rect x="220" y="137" width="38" height="3" rx="1.5" fill="#F5C518" opacity="0.4"/>
  <rect x="220" y="143" width="28" height="3" rx="1.5" fill="#22c55e" opacity="0.4"/>

